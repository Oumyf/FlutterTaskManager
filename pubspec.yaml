name: task_media_app
description: Gestion de tâches avec médias
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter:
    sdk: flutter

  # Base de données locale
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.2

  # Audio
  record: ^4.0.0
  just_audio: ^0.9.36
  audio_waveforms: ^1.0.5

  # Image & Vidéo
  image_picker: ^1.0.7
  video_player: ^2.8.2
  cached_network_image: ^3.3.1

  # Permissions
  permission_handler: ^11.3.0

  # Utilitaires
  uuid: ^4.3.3
  intl: ^0.19.0
  path: ^1.9.0
  flutter_whisper_kit: ^0.3.0
  whisper_kit: ^0.3.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true